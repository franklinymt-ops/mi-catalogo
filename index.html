<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Catálogo · Mobile Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111111;
    --white: #ffffff;
    --gray-50: #fafafa;
    --gray-100: #f4f4f4;
    --gray-200: #e8e8e8;
    --gray-400: #9a9a9a;
    --gray-600: #555555;
    --accent: #c8a96e;
    --accent-dark: #a8893e;
    --whatsapp: #25D366;
    --red: #e05252;
    --radius: 16px;
    --radius-sm: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.14);
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--black); min-height: 100vh; touch-action: manipulation; }

  /* ── BANNER ── */
  .catalog-banner {
    position: relative;
    width: 100%;
    height: 180px;
    background: var(--gray-100);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .catalog-banner img { width: 100%; height: 100%; object-fit: cover; }
  .banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 60%);
    display: flex; align-items: flex-end; justify-content: flex-start;
    padding: 16px;
  }
  .banner-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700; color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 12px;
  }
  .header-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; gap: 8px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--black); text-decoration: none; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; align-items: center; gap: 6px; }
  .btn-admin { background: var(--white); border: 1.5px solid var(--gray-200); color: var(--gray-600); font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 30px; cursor: pointer; }
  .search-box { position: relative; }
  .search-box input { background: var(--gray-100); border: none; border-radius: 30px; padding: 8px 16px 8px 36px; font-size: 14px; width: 140px; outline: none; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

  /* ── CATEGORIES ── */
  .cats-bar { background: var(--white); border-bottom: 1px solid var(--gray-100); position: sticky; top: 56px; z-index: 90; }
  .cats-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
  .cat-pill { white-space: nowrap; background: var(--white); border: 1.5px solid var(--gray-200); color: var(--gray-600); font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 30px; cursor: pointer; }
  .cat-pill.active { background: var(--black); border-color: var(--black); color: var(--white); }

  /* ── MAIN ── */
  main { max-width: 900px; margin: 0 auto; padding: 20px 12px 80px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media(min-width:600px){ .grid { grid-template-columns: repeat(3, 1fr); } }
  @media(min-width:900px){ .grid { grid-template-columns: repeat(4, 1fr); } }

  .card { background: var(--white); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--gray-200); cursor: pointer; }
  .card-img { aspect-ratio: 3/4; background: var(--gray-100); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 10px 12px 12px; }
  .card-cat { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; }
  .card-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-price { font-size: 15px; font-weight: 700; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; padding-bottom: 24px; }
  .modal-handle { width: 40px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 12px auto 0; }
  .modal-img { aspect-ratio: 4/3; background: var(--gray-100); }
  .modal-body { padding: 20px 20px 0; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; }
  .modal-price { font-size: 24px; font-weight: 700; margin: 8px 0 16px; }
  .opt-btn { border: 1.5px solid var(--gray-200); background: none; padding: 8px 16px; border-radius: 30px; font-size: 14px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
  .opt-btn.selected { background: var(--black); color: white; border-color: var(--black); }
  .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--whatsapp); color: white; border: none; border-radius: 40px; width: 100%; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }

  /* ── ADMIN PANEL ── */
  .panel-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
  .panel-overlay.open { display: flex; }
  .panel { background: var(--white); width: 100%; max-width: 480px; height: 100vh; overflow-y: auto; margin-left: auto; display: flex; flex-direction: column; }
  .panel-header { padding: 18px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; }
  .panel-close { background: none; border: none; font-size: 28px; cursor: pointer; }
  .panel-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--gray-100); padding: 0 12px; gap: 4px; }
  .tab-btn { background: none; border: none; border-bottom: 3px solid transparent; padding: 14px 16px; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--gray-400); white-space: nowrap; }
  .tab-btn.active { border-bottom-color: var(--black); color: var(--black); font-weight: 600; }
  .tab-content { display: none; padding: 20px 16px; flex: 1; }
  .tab-content.active { display: block; }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; margin-bottom: 8px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 16px; background: var(--white); }
  .btn-primary, .btn-secondary, .btn-danger { padding: 14px 20px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; border: none; cursor: pointer; margin-bottom: 8px; }
  .btn-primary { background: var(--black); color: white; }
  .btn-secondary { background: var(--gray-100); color: var(--black); }
  .btn-danger { background: none; border: 1.5px solid var(--red); color: var(--red); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--black); color: white; padding: 12px 24px; border-radius: 40px; z-index: 999; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }

  /* Banner settings preview */
  .banner-preview { width: 100%; height: 120px; border-radius: var(--radius-sm); background: var(--gray-100); margin-top: 8px; overflow: hidden; }
  .banner-preview img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<!-- BANNER -->
<div class="catalog-banner" id="catalogBanner">
  <img id="bannerImg" src="" alt="Banner" style="display:none">
  <div class="banner-overlay">
    <div class="banner-title" id="bannerTitle">Moda.</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a href="#" class="logo" id="storeName">Moda<span>.</span></a>
    <div class="header-actions">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar…" enterkeyhint="search">
      </div>
      <button class="btn-admin" onclick="openLogin()">⚙ Admin</button>
    </div>
  </div>
</header>

<!-- CATEGORIES -->
<div class="cats-bar">
  <div class="cats-inner" id="catsBar"></div>
</div>

<main>
  <div id="sectionTitle" class="section-title" style="display:none"></div>
  <div class="grid" id="productGrid"></div>
  <div class="empty-state" id="emptyState" style="text-align:center;padding:60px 20px;color:var(--gray-400);display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg>
    <p>No hay productos aún.</p>
  </div>
</main>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal" onclick="closeModal(event)">
  <div class="modal-wrapper">
    <button class="modal-close" onclick="closeProductModal()" style="position:absolute;top:14px;right:14px;z-index:10;background:var(--gray-100);border:none;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer">×</button>
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-img" id="modalImg"></div>
      <div class="modal-body">
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div id="sizesSection"><div class="modal-label">Talla</div><div class="options-row" id="sizesRow"></div></div>
        <div id="colorsSection"><div class="modal-label">Color</div><div class="options-row" id="colorsRow"></div></div>
        <div class="modal-stock" id="modalStock"></div>
        <button class="btn-whatsapp" id="btnWhatsapp" onclick="sendToWhatsapp()">💬 Separar por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:20px">
  <div class="login-box" style="background:white;border-radius:24px;padding:32px 24px;width:100%;max-width:360px">
    <div class="login-title" style="font-family:'Playfair Display',serif;font-size:24px;font-weight:600">Panel Admin</div>
    <div class="login-sub" style="font-size:14px;color:var(--gray-400);margin-bottom:24px">Ingresa tu contraseña</div>
    <div class="login-err" id="loginErr" style="background:#fee;color:var(--red);border-radius:12px;padding:12px;margin-bottom:20px;display:none">Contraseña incorrecta</div>
    <div class="form-group"><input type="password" class="form-input" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkLogin()"></div>
    <button class="btn-primary" onclick="checkLogin()">Entrar</button>
    <button class="btn-secondary" style="margin-top:12px" onclick="closeLogin()">Cancelar</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="panel-overlay" id="adminPanel">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">⚙ Administrador</div>
      <button class="panel-close" onclick="closeAdmin()">×</button>
    </div>
    <div class="panel-tabs" id="panelTabs">
      <button class="tab-btn active" data-tab="products">Productos</button>
      <button class="tab-btn" data-tab="addProduct">➕ Agregar</button>
      <button class="tab-btn" data-tab="categories">📂 Categorías</button>
      <button class="tab-btn" data-tab="bulk">📤 Carga masiva</button>
      <button class="tab-btn" data-tab="settings">⚙ Ajustes</button>
    </div>

    <!-- TAB PRODUCTS -->
    <div class="tab-content active" id="tab-products">
      <div id="productListAdmin"></div>
    </div>

    <!-- TAB ADD PRODUCT (con imágenes y color avanzado) -->
    <div class="tab-content" id="tab-addProduct">
      <input type="hidden" id="editingId">
      <div class="form-group">
        <label class="form-label">📸 Imágenes</label>
        <div class="images-manager" style="border:2px dashed var(--gray-200);border-radius:var(--radius);padding:16px">
          <div class="images-grid" id="imagesGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px"></div>
          <div class="add-img-btn" onclick="document.getElementById('multiImgInput').click()" style="background:var(--gray-100);border-radius:8px;padding:12px;text-align:center;cursor:pointer">➕ Agregar imagen</div>
          <input type="file" accept="image/*" id="multiImgInput" style="display:none" onchange="addNewImage(event)">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="pName"></div>
      <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Precio</label><input type="number" class="form-input" id="pPrice"></div>
        <div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input" id="pStock" value="10"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="pCategory"></select></div>
        <div class="form-group"><label class="form-label">Destacar</label><select class="form-select" id="pNew"><option value="0">Normal</option><option value="1">Novedad ✨</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Tallas</label><div id="sizesWrap" style="border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px;min-height:48px"><input type="text" id="sizeInput" placeholder="Ej: 38 ↵" onkeydown="addTag(event,'sizes')" style="border:none;outline:none;width:100%"></div></div>
      <div class="form-group"><label class="form-label">🎨 Colores</label>
        <div style="border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:16px">
          <div id="colorPresets" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px"></div>
          <div style="display:flex;gap:8px">
            <input type="color" id="colorPicker" value="#111111" style="width:60px;height:50px">
            <input type="text" class="form-input" id="colorName" placeholder="Nombre" style="flex:1">
            <button class="btn-secondary" onclick="addColor()" style="width:auto;padding:12px 16px">+</button>
          </div>
          <div id="colorsAdmin" style="margin-top:12px"></div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-textarea" id="pDesc"></textarea></div>
      <button class="btn-primary" onclick="saveProduct()" id="saveBtn">Guardar producto</button>
      <button class="btn-secondary" onclick="clearForm()">Limpiar</button>
    </div>

    <!-- TAB CATEGORIES -->
    <div class="tab-content" id="tab-categories">
      <div style="display:flex;gap:12px;margin-bottom:20px">
        <input type="text" class="form-input" id="newCatInput" placeholder="Nueva categoría">
        <button class="btn-primary" style="width:auto;padding:14px 20px" onclick="addCategory()">Agregar</button>
      </div>
      <div id="catListAdmin"></div>
    </div>

    <!-- TAB BULK CSV -->
    <div class="tab-content" id="tab-bulk">
      <h3 style="margin-bottom:16px">📤 Carga masiva CSV</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        <button class="btn-secondary" onclick="downloadTemplateCSV()">📄 Plantilla CSV</button>
        <button class="btn-primary" onclick="importFromCSV()">⬆️ Importar</button>
      </div>
      <textarea class="csv-textarea" id="csvData" placeholder="Pega aquí el contenido CSV..." style="width:100%;min-height:180px;font-family:monospace;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--gray-200)"></textarea>
    </div>

    <!-- TAB SETTINGS (con moneda y banner) -->
    <div class="tab-content" id="tab-settings">
      <div class="form-group"><label class="form-label">Nombre tienda</label><input class="form-input" id="settingStoreName"></div>
      <div class="form-group"><label class="form-label">Moneda</label>
        <select class="form-select" id="settingCurrency">
          <option value="COP">COP - Peso colombiano ($)</option>
          <option value="USD">USD - Dólar estadounidense (US$)</option>
          <option value="VES">VES - Bolívar soberano (Bs.)</option>
          <option value="EUR">EUR - Euro (€)</option>
          <option value="MXN">MXN - Peso mexicano (MX$)</option>
          <option value="ARS">ARS - Peso argentino (AR$)</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">WhatsApp (código país)</label><input class="form-input" id="settingWA" placeholder="573001234567"></div>
      <div class="form-group"><label class="form-label">Mensaje separado</label><textarea class="form-textarea" id="settingMsg"></textarea></div>
      <div class="form-group"><label class="form-label">Banner del catálogo</label>
        <div style="border:2px dashed var(--gray-200);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer" onclick="document.getElementById('bannerFileInput').click()">
          <p>📸 Toca para subir imagen de banner</p>
          <input type="file" accept="image/*" id="bannerFileInput" style="display:none" onchange="previewBanner(event)">
        </div>
        <div class="banner-preview" id="bannerPreview"></div>
      </div>
      <div class="form-group"><label class="form-label">Nueva contraseña</label><input type="password" class="form-input" id="newPassword" placeholder="Mínimo 4 caracteres"></div>
      <button class="btn-primary" onclick="saveSettings()">Guardar ajustes</button>
      <button class="btn-danger" style="margin-top:20px" onclick="confirmClearAll()">🗑 Borrar todos los productos</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let products = JSON.parse(localStorage.getItem('cat_products') || '[]');
let categories = JSON.parse(localStorage.getItem('cat_categories') || '["Zapatos","Ropa","Accesorios"]');
let settings = JSON.parse(localStorage.getItem('cat_settings') || '{"name":"Mi Tienda","wa":"573001234567","msg":"Hola! Quiero separar este producto:","pass":"admin123","currency":"COP","banner":""}');
let currentProduct = null;
let selectedSize = null, selectedColor = null;
let currentFilter = 'all';
let sizeTags = [], colorTags = [];
let productImages = [];
let tempBannerData = null;

const colorPalette = ['#111111','#FFFFFF','#C8A96E','#E05252','#4A90E2','#50E3C2','#F5A623','#8B572A','#9013FE','#417505'];

// ── INIT ──
function init() {
  document.getElementById('storeName').textContent = settings.name || 'Moda';
  document.getElementById('bannerTitle').textContent = settings.name || 'Moda';
  updateBannerDisplay();
  renderCats();
  renderProducts();
  renderCatAdmin();
  renderProductsAdmin();
  document.getElementById('settingStoreName').value = settings.name || '';
  document.getElementById('settingWA').value = settings.wa || '';
  document.getElementById('settingMsg').value = settings.msg || '';
  document.getElementById('settingCurrency').value = settings.currency || 'COP';
  document.getElementById('searchInput').addEventListener('input', e => renderProducts(e.target.value));
  renderColorPresets();
  // Tab switching event delegation
  document.querySelectorAll('#panelTabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      switchTab(this.dataset.tab);
    });
  });
}
function updateBannerDisplay() {
  const bannerImg = document.getElementById('bannerImg');
  if (settings.banner) {
    bannerImg.src = settings.banner;
    bannerImg.style.display = 'block';
  } else {
    bannerImg.style.display = 'none';
  }
}
function renderColorPresets() {
  document.getElementById('colorPresets').innerHTML = colorPalette.map(c => `<div style="width:40px;height:40px;border-radius:40px;background:${c};border:2px solid var(--gray-200);cursor:pointer" onclick="selectPresetColor('${c}')"></div>`).join('');
}
function selectPresetColor(hex) { document.getElementById('colorPicker').value = hex; }

// ── CATEGORÍAS ──
function renderCats() {
  const bar = document.getElementById('catsBar');
  bar.innerHTML = `<button class="cat-pill ${currentFilter==='all'?'active':''}" onclick="filterCat('all')">Todo</button>`;
  categories.forEach(c => bar.innerHTML += `<button class="cat-pill ${currentFilter===c?'active':''}" onclick="filterCat('${c}')">${c}</button>`);
}
function filterCat(cat) { currentFilter = cat; renderCats(); renderProducts(); document.getElementById('sectionTitle').style.display = cat!=='all' ? 'block' : 'none'; if(cat!=='all') document.getElementById('sectionTitle').textContent = cat; }

// ── PRODUCTOS ──
function formatPrice(n) {
  const currency = settings.currency || 'COP';
  const value = Number(n).toLocaleString('es-CO');
  const symbols = { COP: '$', USD: 'US$', VES: 'Bs.', EUR: '€', MXN: 'MX$', ARS: 'AR$' };
  return (symbols[currency] || '$') + ' ' + value;
}
function renderProducts(search='') {
  const grid = document.getElementById('productGrid'), empty = document.getElementById('emptyState');
  let list = products.filter(p => currentFilter==='all' ? true : p.category===currentFilter);
  if(search) list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
  if(!list.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = list.map(p => {
    const primaryImg = (p.images && p.images.length) ? p.images.find(i=>i.isPrimary)?.url || p.images[0].url : (p.img || null);
    return `<div class="card" onclick="openProduct('${p.id}')">
      <div class="card-img">${primaryImg ? `<img src="${primaryImg}" alt="${p.name}">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--gray-400)">📷</div>'}</div>
      <div class="card-body"><div class="card-cat">${p.category}</div><div class="card-name">${p.name}</div><div class="card-price">${formatPrice(p.price)}</div></div>
    </div>`;
  }).join('');
}

function openProduct(id) {
  const p = products.find(x=>x.id===id); if(!p) return;
  currentProduct = p; selectedSize=null; selectedColor=null;
  const images = p.images?.length ? p.images : (p.img ? [{url:p.img, isPrimary:true}] : []);
  const imgContainer = document.getElementById('modalImg');
  if(images.length) {
    imgContainer.innerHTML = `<div style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;height:100%">${images.map(img=>`<div style="flex:0 0 100%;scroll-snap-align:start"><img src="${img.url}" style="width:100%;height:100%;object-fit:cover"></div>`).join('')}</div>`;
  } else imgContainer.innerHTML = '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--gray-400)">Sin imágenes</div>';
  document.getElementById('modalCat').textContent = p.category;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalPrice').textContent = formatPrice(p.price);
  document.getElementById('modalDesc').textContent = p.desc || '';
  const sizeSec = document.getElementById('sizesSection'), sizesRow = document.getElementById('sizesRow');
  if(p.sizes?.length) { sizeSec.style.display='block'; sizesRow.innerHTML = p.sizes.map(s=>`<button class="opt-btn" onclick="selectSize('${s}',this)">${s}</button>`).join(''); }
  else sizeSec.style.display='none';
  const colorSec = document.getElementById('colorsSection'), colorsRow = document.getElementById('colorsRow');
  if(p.colors?.length) { colorSec.style.display='block'; colorsRow.innerHTML = p.colors.map(c=>`<button class="opt-btn" onclick="selectColor('${c.name}','${c.hex}',this)"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${c.hex};margin-right:6px"></span>${c.name}</button>`).join(''); }
  else colorSec.style.display='none';
  document.getElementById('modalStock').innerHTML = p.stock==0 ? '⚠ Agotado' : `Stock: ${p.stock}`;
  document.getElementById('btnWhatsapp').disabled = p.stock==0;
  document.getElementById('productModal').classList.add('open');
}
function selectSize(s,btn){ selectedSize=s; document.querySelectorAll('#sizesRow .opt-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function selectColor(name,hex,btn){ selectedColor={name,hex}; document.querySelectorAll('#colorsRow .opt-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function closeProductModal(){ document.getElementById('productModal').classList.remove('open'); }
function closeModal(e){ if(e.target.classList.contains('modal-overlay')) closeProductModal(); }

function sendToWhatsapp(){
  if(!currentProduct) return;
  const p = currentProduct;
  if(p.sizes?.length && !selectedSize) { showToast('Selecciona talla'); return; }
  if(p.colors?.length && !selectedColor) { showToast('Selecciona color'); return; }
  let msg = `${settings.msg}\n\n📦 *${p.name}*\n💰 ${formatPrice(p.price)}`;
  if(selectedSize) msg += `\n📏 Talla: ${selectedSize}`;
  if(selectedColor) msg += `\n🎨 Color: ${selectedColor.name}`;
  msg += `\n🏷 ${p.category}`;
  window.open(`https://wa.me/${settings.wa}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── ADMIN ──
function openLogin(){ document.getElementById('loginOverlay').style.display='flex'; document.getElementById('loginPass').focus(); }
function closeLogin(){ document.getElementById('loginOverlay').style.display='none'; }
function checkLogin(){
  if(document.getElementById('loginPass').value === (settings.pass||'admin123')) { closeLogin(); openAdmin(); }
  else { document.getElementById('loginErr').style.display='block'; }
}
function openAdmin(){
  populateCatSelect(); renderProductsAdmin(); renderCatAdmin();
  document.getElementById('settingStoreName').value=settings.name; document.getElementById('settingWA').value=settings.wa; document.getElementById('settingMsg').value=settings.msg;
  document.getElementById('settingCurrency').value=settings.currency||'COP';
  document.getElementById('adminPanel').classList.add('open');
}
function closeAdmin(){ document.getElementById('adminPanel').classList.remove('open'); }
function switchTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  if(tabId==='addProduct' && !document.getElementById('editingId').value) clearForm();
}

// ── IMÁGENES ──
function addNewImage(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    productImages.push({ url: ev.target.result, isPrimary: productImages.length===0 });
    renderImageGrid();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function renderImageGrid(){
  const grid = document.getElementById('imagesGrid');
  grid.innerHTML = productImages.map((img,i)=>`
    <div style="aspect-ratio:1;border-radius:8px;background:var(--gray-100);position:relative;border:2px solid ${img.isPrimary?'var(--accent)':'transparent'}">
      <img src="${img.url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">
      <div style="position:absolute;top:4px;right:4px;display:flex;gap:4px">
        <button style="background:rgba(0,0,0,0.5);color:white;border:none;width:24px;height:24px;border-radius:20px" onclick="setPrimaryImage(${i})">⭐</button>
        <button style="background:rgba(0,0,0,0.5);color:white;border:none;width:24px;height:24px;border-radius:20px" onclick="removeProductImage(${i})">✕</button>
      </div>
    </div>`).join('');
}
function setPrimaryImage(idx){ productImages.forEach((img,i)=> img.isPrimary = i===idx); renderImageGrid(); }
function removeProductImage(idx){ productImages.splice(idx,1); if(productImages.length && !productImages.some(i=>i.isPrimary)) productImages[0].isPrimary=true; renderImageGrid(); }

// ── COLOR ──
function addColor(){
  const hex = document.getElementById('colorPicker').value, name = document.getElementById('colorName').value.trim() || hex;
  if(colorTags.find(c=>c.hex===hex)) { showToast('Color ya existe'); return; }
  colorTags.push({hex, name}); renderColorTags(); document.getElementById('colorName').value='';
}
function renderColorTags(){
  document.getElementById('colorsAdmin').innerHTML = colorTags.map((c,i)=>`<span style="display:inline-block;background:var(--gray-100);padding:4px 10px;border-radius:20px;margin:4px"><span style="background:${c.hex};width:12px;height:12px;display:inline-block;border-radius:50%;margin-right:6px"></span>${c.name} <button onclick="removeColor(${i})" style="background:none;border:none">✕</button></span>`).join('');
}
function removeColor(i){ colorTags.splice(i,1); renderColorTags(); }

// ── TALLAS ──
function addTag(e, type){ if(e.key!=='Enter') return; e.preventDefault(); const val=document.getElementById('sizeInput').value.trim(); if(val && !sizeTags.includes(val)){ sizeTags.push(val); renderSizeTags(); } document.getElementById('sizeInput').value=''; }
function renderSizeTags(){
  const wrap = document.getElementById('sizesWrap');
  wrap.querySelectorAll('.size-tag').forEach(t=>t.remove());
  sizeTags.forEach((t,i)=>{
    const tag = document.createElement('span'); tag.className='size-tag';
    tag.style.cssText = 'background:var(--gray-100);padding:6px 12px;border-radius:20px;margin:4px;display:inline-block';
    tag.innerHTML = `${t} <button onclick="removeSize(${i})" style="background:none;border:none">✕</button>`;
    wrap.insertBefore(tag, document.getElementById('sizeInput'));
  });
}
function removeSize(i){ sizeTags.splice(i,1); renderSizeTags(); }

// ── GUARDAR PRODUCTO ──
function saveProduct(){
  const name=document.getElementById('pName').value.trim(), price=document.getElementById('pPrice').value, cat=document.getElementById('pCategory').value;
  if(!name||!price||!cat){ showToast('Nombre, precio y categoría obligatorios'); return; }
  const editId=document.getElementById('editingId').value;
  const product = {
    id: editId || Date.now().toString(),
    name, price: Number(price), stock: Number(document.getElementById('pStock').value)||0,
    category: cat, isNew: document.getElementById('pNew').value, desc: document.getElementById('pDesc').value.trim(),
    sizes: [...sizeTags], colors: [...colorTags],
    images: productImages.length ? productImages : (editId ? (products.find(p=>p.id===editId)?.images||[]) : [])
  };
  if(editId) { const idx=products.findIndex(p=>p.id===editId); if(idx>-1) products[idx]=product; }
  else products.unshift(product);
  save(); clearForm(); switchTab('products'); renderProducts(); renderProductsAdmin(); showToast('Producto guardado');
}
function clearForm(){
  document.getElementById('editingId').value=''; document.getElementById('pName').value=''; document.getElementById('pPrice').value=''; document.getElementById('pStock').value='10';
  document.getElementById('pCategory').value=''; document.getElementById('pNew').value='0'; document.getElementById('pDesc').value='';
  sizeTags=[]; colorTags=[]; productImages=[]; renderSizeTags(); renderColorTags(); renderImageGrid();
  document.getElementById('saveBtn').textContent='Guardar producto';
}
function editProduct(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  switchTab('addProduct'); document.getElementById('editingId').value=p.id;
  document.getElementById('pName').value=p.name; document.getElementById('pPrice').value=p.price; document.getElementById('pStock').value=p.stock;
  populateCatSelect(); document.getElementById('pCategory').value=p.category; document.getElementById('pNew').value=p.isNew||'0'; document.getElementById('pDesc').value=p.desc||'';
  sizeTags=[...(p.sizes||[])]; colorTags=[...(p.colors||[])]; productImages=[...(p.images||[])];
  if(!productImages.length && p.img) productImages=[{url:p.img, isPrimary:true}];
  renderSizeTags(); renderColorTags(); renderImageGrid();
  document.getElementById('saveBtn').textContent='Actualizar';
}
function deleteProduct(id){ if(confirm('¿Eliminar?')){ products=products.filter(p=>p.id!==id); save(); renderProducts(); renderProductsAdmin(); showToast('Eliminado'); } }
function renderProductsAdmin(){
  const cont=document.getElementById('productListAdmin');
  cont.innerHTML = products.map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--gray-100)"><img src="${(p.images?.find(i=>i.isPrimary)||p.images?.[0])?.url || p.img || ''}" style="width:56px;height:74px;border-radius:8px;object-fit:cover;background:var(--gray-100)" onerror="this.src=''"><div style="flex:1"><div style="font-size:15px;font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--gray-400)">${p.category} · ${formatPrice(p.price)}</div></div><div style="display:flex;gap:8px"><button style="background:var(--gray-100);border:none;width:44px;height:44px;border-radius:12px;font-size:18px" onclick="editProduct('${p.id}')">✏️</button><button style="background:var(--gray-100);border:none;width:44px;height:44px;border-radius:12px;font-size:18px" onclick="deleteProduct('${p.id}')">🗑</button></div></div>`).join('') || '<p style="padding:20px;color:gray">Sin productos</p>';
}
function populateCatSelect(){ const sel=document.getElementById('pCategory'); sel.innerHTML = '<option value="">Seleccionar</option>'+categories.map(c=>`<option>${c}</option>`).join(''); }
function addCategory(){ const val=document.getElementById('newCatInput').value.trim(); if(val && !categories.includes(val)){ categories.push(val); save(); renderCats(); renderCatAdmin(); populateCatSelect(); showToast('Categoría agregada'); } }
function deleteCategory(cat){ if(confirm(`¿Eliminar ${cat}?`)){ categories=categories.filter(c=>c!==cat); save(); renderCats(); renderCatAdmin(); } }
function renderCatAdmin(){ document.getElementById('catListAdmin').innerHTML = categories.map(c=>`<div style="display:flex;justify-content:space-between;padding:12px 0"><span>${c}</span><button class="btn-danger" style="width:auto;padding:8px 16px" onclick="deleteCategory('${c}')">Eliminar</button></div>`).join(''); }

// ── CSV ──
function downloadTemplateCSV(){
  let csv = "nombre,precio,categoria,stock,destacar,tallas,descripcion,colores,imagenes\n";
  csv += "Zapatilla Urban,150000,Zapatos,10,0,\"38,39,40\",\"Descripción ejemplo\",\"Negro:#111111,Rojo:#E05252\",\"url1,url2\"\n";
  csv += "Camisa Lino,89000,Ropa,5,1,\"S,M,L\",\"100% algodón\",\"Blanco:#FFFFFF\",\"\"";
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'plantilla_productos.csv'; link.click();
}
function importFromCSV(){
  const text = document.getElementById('csvData').value.trim(); if(!text) return showToast('Pega datos CSV');
  const lines = text.split('\n').filter(l=>l.trim()); if(lines.length<2) return;
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
  const newProducts = [];
  for(let i=1; i<lines.length; i++){
    const values = parseCSVLine(lines[i]);
    const p = {};
    headers.forEach((h,idx)=> p[h] = values[idx] || '');
    if(!p.nombre || !p.precio) continue;
    const colors = p.colores ? p.colores.split(',').map(c=>{ const [name,hex]=c.split(':'); return {name:name?.trim()||hex, hex:hex?.trim()||'#111111'}; }) : [];
    const images = p.imagenes ? p.imagenes.split(',').map((url,i)=> ({url:url.trim(), isPrimary:i===0})) : [];
    newProducts.push({
      id: Date.now().toString()+i,
      name: p.nombre, price: Number(p.precio), category: p.categoria||'Sin categoría', stock: Number(p.stock)||0,
      isNew: p.destacar==='1'?'1':'0', desc: p.descripcion||'',
      sizes: p.tallas ? p.tallas.split(',').map(s=>s.trim()) : [],
      colors, images
    });
  }
  if(newProducts.length){ products = [...newProducts, ...products]; save(); renderProducts(); renderProductsAdmin(); switchTab('products'); showToast(`${newProducts.length} productos importados`); }
  document.getElementById('csvData').value = '';
}
function parseCSVLine(line){ const result=[]; let current='', inQuotes=false; for(let char of line){ if(char==='"') inQuotes=!inQuotes; else if(char===',' && !inQuotes){ result.push(current.trim()); current=''; } else current+=char; } result.push(current.trim()); return result; }

// ── SETTINGS + BANNER ──
function previewBanner(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    tempBannerData = ev.target.result;
    document.getElementById('bannerPreview').innerHTML = `<img src="${tempBannerData}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
}
function saveSettings(){
  const newPass = document.getElementById('newPassword').value;
  settings.name = document.getElementById('settingStoreName').value.trim();
  settings.wa = document.getElementById('settingWA').value.replace(/\D/g,'');
  settings.msg = document.getElementById('settingMsg').value.trim();
  settings.currency = document.getElementById('settingCurrency').value;
  if(newPass.length>=4) settings.pass = newPass;
  else if(newPass.length) showToast('Contraseña mínimo 4 caracteres');
  if(tempBannerData !== undefined) settings.banner = tempBannerData;
  save();
  document.getElementById('storeName').textContent = settings.name;
  document.getElementById('bannerTitle').textContent = settings.name;
  updateBannerDisplay();
  renderProducts(); // update prices
  showToast('Ajustes guardados');
  tempBannerData = null;
}
function confirmClearAll(){ if(confirm('¿Borrar TODOS los productos?')){ products=[]; save(); renderProducts(); renderProductsAdmin(); } }

function save(){ localStorage.setItem('cat_products', JSON.stringify(products)); localStorage.setItem('cat_categories', JSON.stringify(categories)); localStorage.setItem('cat_settings', JSON.stringify(settings)); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeProductModal(); closeAdmin(); closeLogin(); } });
init();
</script>
